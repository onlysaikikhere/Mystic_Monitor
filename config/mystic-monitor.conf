[Daemon]
# How often (in seconds) the ML model polls system metrics
poll_interval_seconds = 5

# Path to the compiled Python pickle ML model
model_path = /opt/mystic_monitor/model.pkl

# Inter-Process Communication (Unix Domain Socket) location
socket_path = /run/mystic/mystic.sock

[ActiveMitigation]
# Operational Mode: monitor, throttle, or kill
# monitor: only logs anomilies without taking actions
# throttle: renice processes to lowest priority
# kill: renice processes and escalate to SIGKILL after consecutive violations
mode = kill

# Consecutive periods the process must exceed thresholds before escalation
consecutive_trips = 3

# Seconds to wait before penalizing the exact same PID again
cooldown_seconds = 30

# Toggle the OS Process Throttler
enable_throttling = true
throttle_cpu_threshold = 40.0

# Toggle the OS Auto-Reaper
enable_reaper = true
reaper_cpu_threshold = 85.0

# Critical system binaries that the ML model is never allowed to throttle or kill
protected_processes = systemd,sshd,bash,mystic_top,mystic_status,tmux,python3,init

# Path to the historical audit log
audit_log_path = /var/log/mystic-anomalies.log
